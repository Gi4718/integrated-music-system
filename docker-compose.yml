services:
  endfield-music:
    build: .
    container_name: endfield-music
    ports:
      - "33550:33550"  # HTTP
      - "33551:33551"  # HTTPS
    volumes:
      - ./data/config:/data/config
      - ./data/ssl:/data/ssl
      - ./data/downloads:/data/downloads
      - ./data/db:/data/db
      - /vol1/1000/music:/music
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:33550/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
